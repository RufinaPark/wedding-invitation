<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유OO ♡ 박OO 저희 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* [기존 스타일 유지] */
        body {
            font-family: 'Nanum Myeongjo', serif;
            margin: 0; padding: 0; background-color: #fff; color: #333;
            line-height: 1.8; text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .main-section { padding: 80px 20px; background: #f9f9f9; }
        .main-title { font-size: 24px; letter-spacing: 5px; margin-bottom: 20px; }
        .main-img { width: 100%; height: auto; border-radius: 2px; margin: 20px 0; }
        section { padding: 60px 0; border-bottom: 1px solid #eee; }
        h2 { font-size: 18px; color: #888; margin-bottom: 30px; letter-spacing: 2px; }

        /* [추가 및 수정] 연락처 모달 관련 스타일 */
        #contactBtn {
            background-color: #1a1f3c; color: white;
            width: 80%; padding: 12px; border-radius: 5px; 
            border: none; margin-top: 15px; cursor: pointer;
            font-family: 'Nanum Myeongjo', serif; font-size: 16px;
        }

        #contactModal {
            display: none; /* 기본적으로 숨김 */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            align-items: center; justify-content: center;
        }
        #contactModal.active { display: flex; } /* 열렸을 때만 보임 */

        .contact-modal-content {
            background: #fff; width: 85%; max-width: 350px;
            border-radius: 10px; overflow: hidden; text-align: left;
        }
        .contact-modal-header {
            background: #1a1f3c; color: #fff; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 신랑/신부 구분 디자인 */
        .side-group { padding-bottom: 10px; }
        .side-title { 
            background-color: #f8f9fa; padding: 8px 20px; 
            font-size: 13px; color: #666; font-weight: bold;
            border-bottom: 1px solid #eee;
        }
        .groom-side .contact-label { color: #5a78af; } /* 신랑측 푸른색 포인트 */
        .bride-side .contact-label { color: #c06c84; } /* 신부측 붉은색 포인트 */

        .contact-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; border-bottom: 1px solid #f0f0f0;
        }
        .contact-row:last-child { border-bottom: none; }
        .contact-label { font-size: 14px; width: 80px; }
        .contact-name { flex-grow: 1; font-weight: bold; }
        .contact-icons a { text-decoration: none; margin-left: 15px; font-size: 20px; }

        /* [기타 스타일] */
        .btn-box { background: #f4f4f4; padding: 15px; margin: 10px 0; cursor: pointer; border-radius: 5px; }
        .hidden-content { display: none; padding: 10px; background: #fff; border: 1px solid #eee; }
        #rsvp-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
        }
        .rsvp-trigger {
            position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff;
            padding: 15px 25px; border-radius: 50px; cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

    <div class="container">
        <section>
            <div class="contact-summary">
                유OO · 김OO 아들 <strong>유OO</strong><br>
                박OO · 김OO 딸 <strong>박OO</strong><br>
                <button id="contactBtn">연락하기</button>
            </div>
        </section>

        <div id="contactModal">
            <div class="contact-modal-content">
                <div class="contact-modal-header">
                    <span>연락하기</span>
                    <span id="closeBtn" style="cursor:pointer; font-size:24px;">&times;</span>
                </div>
                <div class="contact-modal-body">
                    <div class="side-group groom-side">
                        <div class="side-title">신랑측</div>
                        <div class="contact-row">
                            <span class="contact-label">신랑</span>
                            <span class="contact-name">유OO</span>
                            <div class="contact-icons">
                                <a href="tel:01012345678">📞</a> <a href="sms:01012345678">✉️</a>
                            </div>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">아버지</span>
                            <span class="contact-name">유OO</span>
                            <div class="contact-icons">
                                <a href="tel:01000000000">📞</a> <a href="sms:01000000000">✉️</a>
                            </div>
                        </div>
                    </div>

                    <div style="height: 8px; background-color: #eee;"></div>

                    <div class="side-group bride-side">
                        <div class="side-title">신부측</div>
                        <div class="contact-row">
                            <span class="contact-label">신부</span>
                            <span class="contact-name">박OO</span>
                            <div class="contact-icons">
                                <a href="tel:01087654321">📞</a> <a href="sms:01087654321">✉️</a>
                            </div>
                        </div>
                        <div class="contact-row">
                            <span class="contact-label">아버지</span>
                            <span class="contact-name">박OO</span>
                            <div class="contact-icons">
                                <a href="tel:01011112222">📞</a> <a href="sms:01011112222">✉️</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        </div>

    <script>
        // 연락처 모달 제어 자바스크립트
        const contactModal = document.getElementById("contactModal");
        const contactBtn = document.getElementById("contactBtn");
        const closeBtn = document.getElementById("closeBtn");

        contactBtn.onclick = function() { contactModal.classList.add("active"); }
        closeBtn.onclick = function() { contactModal.classList.remove("active"); }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            if (event.target == contactModal) {
                contactModal.classList.remove("active");
            }
        }
        
        // (나머지 축의금/RSVP 함수들...)
    </script>
</body>
</html>
